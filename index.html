<!DOCTYPE html>
<html>
<head>
    <title>3D Модель Насоса</title>
    <style>
        body { margin: 0; padding: 0; overflow: hidden; }
        #loading {
            position: absolute;
            bottom: 20px;
            left: 20px;
            color: white;
            background: rgba(0,0,0,0.7);
            padding: 5px 10px;
            border-radius: 5px;
            font-family: sans-serif;
            pointer-events: none;
            z-index: 100;
        }
    </style>
</head>
<body>
    <div id="loading">Загрузка модели...</div>
    <canvas id="canvas" style="width: 100%; height: 100%; display: block;"></canvas>

    <!-- Подключаем библиотеки Babylon.js и загрузчик glTF -->
    <script src="https://cdn.babylonjs.com/babylon.js"></script>
    <script src="https://cdn.babylonjs.com/loaders/babylonjs.loaders.min.js"></script>

    <script>
        // Получаем элемент canvas
        const canvas = document.getElementById("canvas");
        // Создаем движок
        const engine = new BABYLON.Engine(canvas, true);
        // Создаем сцену
        const scene = new BABYLON.Scene(engine);

        // --- 1. СОЗДАЕМ КАМЕРУ И СВЕТ ДО ЗАГРУЗКИ МОДЕЛИ ---
        // Это ключевой момент! Камера должна быть готова к моменту начала рендеринга.
        // Создаем удобную камеру, которой можно управлять мышью.
        const camera = new BABYLON.ArcRotateCamera("camera", -Math.PI / 2, Math.PI / 3, 3, new BABYLON.Vector3(0, 0, 0), scene);
        camera.attachControl(canvas, true); // Включаем управление мышью
        
        // Создаем простой, но эффективный свет
        const light = new BABYLON.HemisphericLight("light", new BABYLON.Vector3(0, 1, 0), scene);
        light.intensity = 0.7; // Немного приглушим, чтобы не было слишком ярко

        // --- 2. ЗАГРУЖАЕМ МОДЕЛЬ ---
        // Используем правильный raw URL для загрузки.
        BABYLON.SceneLoader.Append("https://mezenovperm.github.io/pumps_station/", "00_pumps.gltf", scene, function() {
            // Модель загружена, скрываем индикатор загрузки
            const loadingDiv = document.getElementById("loading");
            if(loadingDiv) loadingDiv.style.display = 'none';
            console.log("Модель успешно загружена!");
            
            // (Опционально) Автоматически настроить камеру по размеру модели
            // scene.activeCamera.useAutoRotationBehavior = true; // Можно раскомментировать для авто-вращения
        });

        // --- 3. ЗАПУСКАЕМ ЦИКЛ РЕНДЕРИНГА ---
        engine.runRenderLoop(function () {
            scene.render();
        });

        // --- 4. ПРАВИЛЬНО ОБРАБАТЫВАЕМ ИЗМЕНЕНИЕ РАЗМЕРА ОКНА ---
        window.addEventListener("resize", function () {
            engine.resize();
        });
    </script>
</body>
</html>
